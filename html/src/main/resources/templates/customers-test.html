<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Html test</title>
</head>

<body>
<h1>Just a demo</h1>
<table>
    <tr>
        <th>First name</th>
        <th> | </th>
        <th>Last name</th>
    </tr>
    <tr th:each="customer : ${customers}">
        <td th:text="${customer.firstName}"></td>
        <td th:text="|"></td>
        <td th:text="${customer.lastName}"></td>
    </tr>
</table>
</body>

</html>
